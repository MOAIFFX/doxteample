<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PANEL - DOSSIER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1428 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(100, 150, 200, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(150, 100, 200, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .title {
            font-size: 3em;
            font-weight: 300;
            letter-spacing: 6px;
            color: #b8b8ff;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(184, 184, 255, 0.3);
        }

        .subtitle {
            color: #8080a0;
            letter-spacing: 2px;
        }

        .panel {
            background: rgba(20, 25, 45, 0.6);
            border: 1px solid rgba(100, 120, 180, 0.2);
            border-radius: 8px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .panel-title {
            font-size: 1.5em;
            color: #9090ff;
            margin-bottom: 30px;
            letter-spacing: 2px;
            border-bottom: 2px solid rgba(144, 144, 255, 0.3);
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #7080a0;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85em;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        textarea {
            width: 100%;
            padding: 12px;
            background: rgba(100, 120, 180, 0.1);
            border: 1px solid rgba(100, 120, 180, 0.3);
            border-radius: 6px;
            color: #d0d0ff;
            font-family: inherit;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        textarea:focus {
            outline: none;
            border-color: rgba(100, 120, 180, 0.6);
            background: rgba(100, 120, 180, 0.15);
            box-shadow: 0 0 20px rgba(100, 120, 180, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 200px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        button {
            padding: 12px 30px;
            background: rgba(144, 144, 255, 0.2);
            border: 1px solid rgba(144, 144, 255, 0.4);
            border-radius: 6px;
            color: #9090ff;
            cursor: pointer;
            font-size: 1em;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(144, 144, 255, 0.3);
            border-color: rgba(144, 144, 255, 0.6);
            box-shadow: 0 4px 12px rgba(144, 144, 255, 0.2);
        }

        .auth-required {
            text-align: center;
            padding: 40px;
        }

        .auth-form {
            max-width: 400px;
            margin: 0 auto;
        }

        .file-list {
            margin-top: 30px;
            border-top: 2px solid rgba(144, 144, 255, 0.3);
            padding-top: 30px;
        }

        .file-item {
            background: rgba(100, 120, 180, 0.1);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(100, 120, 180, 0.2);
        }

        .file-name {
            color: #9090ff;
            font-weight: 500;
        }

        .file-actions button {
            margin-left: 10px;
            padding: 8px 15px;
            font-size: 0.85em;
        }

        .message {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: rgba(100, 200, 100, 0.2);
            border: 1px solid rgba(100, 200, 100, 0.4);
            color: #90ff90;
        }

        .message.error {
            background: rgba(200, 100, 100, 0.2);
            border: 1px solid rgba(200, 100, 100, 0.4);
            color: #ff9090;
        }

        .back-link {
            display: inline-block;
            color: #9090ff;
            text-decoration: none;
            margin-bottom: 30px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            text-shadow: 0 0 10px rgba(144, 144, 255, 0.5);
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2em;
            }

            .panel {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Назад на сайт</a>

        <header>
            <h1 class="title">ADMIN PANEL</h1>
            <p class="subtitle">Управление содержимым</p>
        </header>

        <div class="panel">
            <div id="auth-section" class="auth-required">
                <h2 class="panel-title">Вход в админ-панель</h2>
                <form class="auth-form" id="login-form">
                    <div class="form-group">
                        <label for="password">Защитный код</label>
                        <input type="password" id="password" placeholder="Введите пароль" required>
                    </div>
                    <button type="submit">Войти</button>
                </form>
            </div>

            <div id="admin-section" style="display: none;">
                <div id="message" class="message"></div>

                <h2 class="panel-title">Добавить новый дозье</h2>
                
                <form id="upload-form">
                    <div class="form-group">
                        <label for="file-name">Название файла</label>
                        <input type="text" id="file-name" placeholder="Например: secret-data" required>
                    </div>

                    <div class="form-group">
                        <label for="file-title">Заголовок</label>
                        <input type="text" id="file-title" placeholder="Название дозье" required>
                    </div>

                    <div class="form-group">
                        <label for="file-content">Содержимое</label>
                        <textarea id="file-content" placeholder="Вставьте содержимое файла..." required></textarea>
                    </div>

                    <button type="submit">Опубликовать</button>
                    <button type="button" onclick="logout()">Выход</button>
                </form>

                <div class="file-list">
                    <h3 style="color: #9090ff; margin-bottom: 20px;">Опубликованные дозье:</h3>
                    <div id="files-container">
                        Загрузка...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Простой пароль - измени на свой!
        const ADMIN_PASSWORD = "admin123";
        const FILES_KEY = "dossier_files";

        // Проверка аутентификации
        window.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadFiles();
        });

        function checkAuth() {
            const isAuthenticated = localStorage.getItem('admin_auth') === 'true';
            const authSection = document.getElementById('auth-section');
            const adminSection = document.getElementById('admin-section');

            if (isAuthenticated) {
                authSection.style.display = 'none';
                adminSection.style.display = 'block';
            } else {
                authSection.style.display = 'block';
                adminSection.style.display = 'none';
            }
        }

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;

            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('admin_auth', 'true');
                checkAuth();
                showMessage('Успешный вход!', 'success');
                document.getElementById('password').value = '';
            } else {
                showMessage('Неверный пароль!', 'error');
                document.getElementById('password').value = '';
            }
        });

        document.getElementById('upload-form').addEventListener('submit', (e) => {
            e.preventDefault();

            const fileName = document.getElementById('file-name').value;
            const fileTitle = document.getElementById('file-title').value;
            const fileContent = document.getElementById('file-content').value;

            // Проверка на дублирование
            const files = getFiles();
            if (files.some(f => f.name === fileName)) {
                showMessage('Файл с таким названием уже существует!', 'error');
                return;
            }

            const newFile = {
                id: Date.now(),
                name: fileName,
                title: fileTitle,
                content: fileContent,
                date: new Date().toLocaleDateString('ru-RU')
            };

            files.push(newFile);
            localStorage.setItem(FILES_KEY, JSON.stringify(files));

            showMessage('Дозье успешно опубликовано!', 'success');
            document.getElementById('upload-form').reset();
            loadFiles();
        });

        function getFiles() {
            const stored = localStorage.getItem(FILES_KEY);
            return stored ? JSON.parse(stored) : [];
        }

        function loadFiles() {
            const files = getFiles();
            const container = document.getElementById('files-container');

            if (files.length === 0) {
                container.innerHTML = '<p style="color: #7080a0;">Нет опубликованных файлов</p>';
                return;
            }

            container.innerHTML = files.map(file => `
                <div class="file-item">
                    <div>
                        <div class="file-name">${file.title} (${file.name})</div>
                        <div style="color: #7080a0; font-size: 0.85em; margin-top: 5px;">${file.date}</div>
                    </div>
                    <div class="file-actions">
                        <button onclick="editFile(${file.id})">Редактировать</button>
                        <button onclick="deleteFile(${file.id})" style="color: #ff9090; border-color: rgba(200, 100, 100, 0.4);">Удалить</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteFile(id) {
            if (confirm('Вы уверены?')) {
                const files = getFiles().filter(f => f.id !== id);
                localStorage.setItem(FILES_KEY, JSON.stringify(files));
                loadFiles();
                showMessage('Файл удален', 'success');
            }
        }

        function editFile(id) {
            const file = getFiles().find(f => f.id === id);
            if (file) {
                document.getElementById('file-name').value = file.name;
                document.getElementById('file-title').value = file.title;
                document.getElementById('file-content').value = file.content;
                deleteFile(id);
                window.scrollTo(0, 0);
            }
        }

        function logout() {
            if (confirm('Вы хотите выйти?')) {
                localStorage.removeItem('admin_auth');
                checkAuth();
                showMessage('Вы вышли', 'success');
            }
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
